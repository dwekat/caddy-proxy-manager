name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          # OIDC trusted publishing is used automatically if configured at:
          # https://www.npmjs.com/settings/YOUR_USERNAME/trusted-publishing
          # Otherwise, falls back to NPM_TOKEN secret (granular token required)

      - name: Install Dependencies
        run: npm ci

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm run release
          version: npm run version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN: Only needed if OIDC trusted publishing is not configured
          # For OIDC (recommended): Configure at npmjs.com/settings/~/trusted-publishing
          # For granular token fallback: Create at npmjs.com/settings/~/tokens
          #   - Enable "Bypass 2FA" for CI/CD
          #   - Max 90 days expiration for write tokens
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
